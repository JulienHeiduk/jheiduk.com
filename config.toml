baseurl = "/"
languageCode = "en-us"
theme = "paper-new"
paginate = 5
summaryLength = 70

[params]
  # color style
  color = 'light'                           # linen, wheat, gray, light

  # misc
  disableHLJS = true                        # disable highlight.js
  monoDarkIcon = true                       # show monochrome dark mode icon
  math = true                               # enable KaTex math typesetting globally

  # header social icons
  github = 'JulienHeiduk'                 # github.com/YOUR_GITHUB_ID
  linkedin = 'julien-heiduk'             # linkedin.com/in/YOUR_LINKEDIN_ID

  avatar = 'julien.heiduk@gmail.com'                 # gravatar email or image url
  name = 'Julien Heiduk'
  bio = "Let's talk about recommandation systems and ML in real-world business scenarios."
   
  [blog]
    showSummary = true  
  
