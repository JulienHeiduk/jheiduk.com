baseurl = "https://jheiduk.com/"
languageCode = "en-us"
theme = "paper-new"
paginate = 5
summaryLength = 70

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  # color style
  color = 'light'                           # linen, wheat, gray, light

  # misc
  disableHLJS = true                        # disable highlight.js
  monoDarkIcon = true                       # show monochrome dark mode icon
  math = true                               # enable KaTex math typesetting globally

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    codeFences = true
    guessSyntax = true
    noClasses = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

  # header social icons
  github = 'JulienHeiduk'                 # github.com/YOUR_GITHUB_ID
  linkedin = 'julien-heiduk'             # linkedin.com/in/YOUR_LINKEDIN_ID

  avatar = 'julien.heiduk@gmail.com'                 # gravatar email or image url
  name = 'Julien Heiduk'
  bio = "Building AI systems & production pipelines. Writing about what actually works."
   
  [blog]
    showSummary = true  
  
[menu]

  [[menu.main]]
    identifier = "training"
    name = "Training"
    url = "https://cours.campuz.fr/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "https://jheiduk.com/posts/introduction/"
    weight = 10

  [[menu.main]]
    identifier = "applications"
    name = "Applications"
    url = "#"
    weight = 20

  [[menu.main]]
    identifier = "rag"
    name = "RAG Demo"
    url = "https://jheiduk-rag-demo.streamlit.app/"
    parent = "applications"
    weight = 1

  [[menu.main]]
    identifier = "gnn"
    name = "GNN Explorer"
    url = "https://jheiduk-gnn-explorer.streamlit.app/"
    parent = "applications"
    weight = 2

[languages]
  [languages.en]
    languageName = "English"
    title = "Julien Heiduk"
    subtitle = "A simple blog about data..."
    owner = ""
    keywords = ""
    copyright = ""
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "Back to home page"

    [languages.en.params.logo]
      logoText = "JHeiduk.com"
      logoHomeLink = "/"

